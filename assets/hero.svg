<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 460" width="1400" height="460" preserveAspectRatio="xMidYMid meet">
  <style>
    .ink   { fill: #0a0a0a; }
    .muted { fill: #6b6b6b; }
    .accent-fill   { fill: #b8956a; }
    .accent-stroke { stroke: #b8956a; }

    @media (prefers-color-scheme: dark) {
      .ink   { fill: #f5f5f4; }
      .muted { fill: #a8a29e; }
    }

    .heavy {
      font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 900;
      letter-spacing: -0.045em;
    }
    .caps {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
    }
    .mono {
      font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
      font-weight: 500;
      letter-spacing: 0.12em;
    }
  </style>

  <text x="120" y="110" font-size="13" class="caps muted">Cloud Engineer</text>

  <text x="118" y="300" font-size="210" class="heavy ink">SALIH</text>

  <rect x="124" y="330" width="140" height="5" class="accent-fill"/>

  <text x="124" y="395" font-size="14" class="mono muted">AMSTERDAM &#8226; CLOUD &#43; FULLSTACK &#8226; 2026</text>

  <g class="accent-stroke" fill="none" stroke-width="1" opacity="0.45">
    <line x1="1200" y1="120" x2="1340" y2="120"/>
    <line x1="1200" y1="135" x2="1340" y2="135"/>
    <line x1="1200" y1="150" x2="1340" y2="150"/>
    <line x1="1200" y1="165" x2="1340" y2="165"/>
    <line x1="1200" y1="180" x2="1340" y2="180"/>
    <line x1="1200" y1="195" x2="1340" y2="195"/>
    <line x1="1200" y1="210" x2="1340" y2="210"/>
    <line x1="1200" y1="225" x2="1340" y2="225"/>
  </g>
</svg>
