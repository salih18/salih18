name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: salih18
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=0a0a0a&color_dots=ebebeb,d6d3d1,a8a29e,57534e,b8956a
            dist/github-contribution-grid-snake-dark.svg?color_snake=f5f5f4&color_dots=1f1f1f,3a3a3a,6b6b6b,a8a29e,b8956a

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
